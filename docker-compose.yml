services:
  catchup:
    build: .
    restart: always
    ports:
      - "3002:3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TURSO_DATABASE_URL=${TURSO_DATABASE_URL:-file:/app/data/local.db}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN:-}
      - JWT_SECRET=${JWT_SECRET:-catchup-prod-secret-2026}
      - PRO_SUBDOMAIN_ENABLED=${PRO_SUBDOMAIN_ENABLED:-false}
      - NOTIFICATION_MODE=${NOTIFICATION_MODE:-email}
      - SMTP_FROM=${SMTP_FROM:-noreply@fondation-jae.org}
      - O365_TENANT_ID=${O365_TENANT_ID}
      - O365_CLIENT_ID=${O365_CLIENT_ID}
      - O365_CLIENT_SECRET=${O365_CLIENT_SECRET}
    volumes:
      - catchup-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  catchup-data:
