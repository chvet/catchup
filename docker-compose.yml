services:
  # ═══ PostgreSQL ═══
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: catchup
      POSTGRES_USER: catchup
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CatchUp2026Pg!}
    volumes:
      - /mnt/HC_Volume_105238085/catchup-pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catchup"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══ App Catch'Up (catchup.jaeprive.fr) ═══
  catchup:
    build: .
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3002:3000"
    environment:
      - DATABASE_URL=postgres://catchup:${POSTGRES_PASSWORD:-CatchUp2026Pg!}@postgres:5432/catchup
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-catchup-prod-secret-2026}
      - PRO_HOST=pro.catchup.jaeprive.fr
      - PUBLIC_HOST=catchup.jaeprive.fr
      - APP_BRAND=catchup
      - NOTIFICATION_MODE=${NOTIFICATION_MODE:-email}
      - SMTP_FROM=${SMTP_FROM:-noreply@fondation-jae.org}
      - O365_TENANT_ID=${O365_TENANT_ID}
      - O365_CLIENT_ID=${O365_CLIENT_ID}
      - O365_CLIENT_SECRET=${O365_CLIENT_SECRET}
      - TOKEN_DAILY_LIMIT=200000
      - TOKEN_MONTHLY_LIMIT=2000000
      - PARCOUREO_API_URL=${PARCOUREO_API_URL:-}
      - PARCOUREO_API_KEY=${PARCOUREO_API_KEY:-}
      - GOOGLE_CALENDAR_CLIENT_ID=${GOOGLE_CALENDAR_CLIENT_ID}
      - GOOGLE_CALENDAR_CLIENT_SECRET=${GOOGLE_CALENDAR_CLIENT_SECRET}
      - GOOGLE_CALENDAR_REDIRECT_URI=https://catchup.jaeprive.fr/api/calendar/google/callback
      - O365_CALENDAR_REDIRECT_URI=https://catchup.jaeprive.fr/api/calendar/outlook/callback
      - VONAGE_API_KEY=${VONAGE_API_KEY}
      - VONAGE_API_SECRET=${VONAGE_API_SECRET}
      - VONAGE_SMS_FROM=${VONAGE_SMS_FROM:-CatchUp}
    volumes:
      - /mnt/HC_Volume_105238085/catchup-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

# Données sur le volume Hetzner 1 TO :
# - catchup-pgdata → /mnt/HC_Volume_105238085/catchup-pgdata (PostgreSQL)
# - catchup-data → /mnt/HC_Volume_105238085/catchup-data (uploads, fichiers)
