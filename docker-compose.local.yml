services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: catchup
      POSTGRES_USER: catchup
      POSTGRES_PASSWORD: catchup_local
    volumes:
      - catchup-pgdata-local:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catchup"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  catchup-pgdata-local:
