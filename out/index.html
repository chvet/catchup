<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Catch'Up</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#1A1A2E;display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
    .splash{text-align:center;animation:fadeIn .5s ease-out}
    .logo{font-size:3rem;margin-bottom:.5rem}
    h1{color:#6C63FF;font-size:2rem;font-weight:700}
    p{color:#888;font-size:.875rem;margin-top:.5rem}
    .spinner{width:32px;height:32px;border:3px solid rgba(108,99,255,.2);border-top-color:#6C63FF;border-radius:50%;animation:spin .8s linear infinite;margin:1.5rem auto 0}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo"><img src="/favicon-catchup.svg" alt="" width="64" height="64" style="margin:0 auto"></div>
    <h1>Catch'Up</h1>
    <p>Ton guide orientation</p>
    <div class="spinner"></div>
  </div>
  <script>setTimeout(function(){window.location.href='https://catchup.jaeprive.fr'},500)</script>
</body>
</html>
